apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swarm-worker.fullname" . }}
  labels:
    {{- include "swarm-worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "swarm-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "swarm-worker.labels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "swarm-worker.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "swarm-worker.envFrom" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecrets.DEEPSEEK_API_KEY }}
                optional: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.prometheus.metricsPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /data/cache
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
      volumes:
        - name: cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "swarm-worker.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
