apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "swarm-worker.fullname" . }}-config
  labels:
    {{- include "swarm-worker.labels" . | nindent 4 }}
data:
  OTEL_ENVIRONMENT: {{ .Values.env.OTEL_ENVIRONMENT | quote }}
  MCP_USE_WORKER: {{ .Values.env.MCP_USE_WORKER | quote }}
  ARCHITECT_MODEL: {{ .Values.env.ARCHITECT_MODEL | quote }}
  CODER_MODEL: {{ .Values.env.CODER_MODEL | quote }}
  REVIEWER_MODEL: {{ .Values.env.REVIEWER_MODEL | quote }}
