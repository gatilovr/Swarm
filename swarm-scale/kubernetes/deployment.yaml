apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarm-scale
  namespace: swarm-system
  labels:
    app: swarm-scale
    component: worker
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: swarm-scale
  template:
    metadata:
      labels:
        app: swarm-scale
        component: worker
    spec:
      serviceAccountName: swarm-scale
      containers:
        - name: worker
          image: swarm-scale:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: metrics
          env:
            - name: SCALE_MAX_WORKERS
              value: "10"
            - name: SCALE_RPM_LIMIT
              value: "500"
            - name: SCALE_CACHE_DIR
              value: "/data/cache"
            - name: SCALE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: swarm-scale-secrets
                  key: redis-url
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: swarm-scale-secrets
                  key: deepseek-api-key
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: cache
              mountPath: /data/cache
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import swarm_scale; print('OK')"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import swarm_scale; print('OK')"
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: swarm-scale-metrics
  namespace: swarm-system
  labels:
    app: swarm-scale
spec:
  selector:
    app: swarm-scale
  ports:
    - port: 8000
      targetPort: metrics
      name: metrics
