# Gitleaks configuration for Swarm project
title = "Swarm Secret Scanner"

[allowlist]
description = "Known false positives and test data"
paths = [
    '''(.*__pycache__.*)''',
    '''(.*\.git.*)''',
    '''(.*\.hypothesis.*)''',
    '''(.*tests/.*)''',  # test files may contain mock secrets
]

[[rules]]
id = "swarm-api-key"
description = "Swarm API Key"
regex = '''(?i)(DEEPSEEK|OPENAI|ANTHROPIC|GROQ|EXA)_API_KEY=['"][A-Za-z0-9_-]{20,}['"]'''
tags = ["api-key", "swarm"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[-_]?key|apikey|secret[-_]?key|token)['"]?\s*[:=]\s*['"][A-Za-z0-9_\-\.]{20,}['"]'''
tags = ["api-key", "generic"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "credentials"]
